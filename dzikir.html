<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dzikir Page</title>

    <link rel="stylesheet" href="src/dist/output.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">
</head>
<body class="bg-creme">
    <header class = "p-10">
        <div class="text-center">
            <h1 class="text-2xl md:text-5xl font-relation text-blue/65">Ramadhan Mubarak</h1>
            <h2 class="text-5xl md:text-8xl font-header text-yellow">Dzikir Counter</h2>
        </div>
        <hr class="border border-solid border-black mt-12">
        <nav class="p-6 text-lg text-black font-description">
            <!-- Desktop Menu -->
            <ul class="hidden md:flex justify-center gap-10">
                <li class="cursor-pointer hover:text-pink transition"><a href="index.html">Home</a></li>
                <li class="cursor-pointer hover:text-pink transition"><a href="doa.html">Doa-Doa</a></li>
                <li class="cursor-pointer hover:text-pink transition"><a href="dzikir.html">Dzikir Counter</a></li>
                <li class="cursor-pointer hover:text-pink transition"><a href="hitung-zakat.html">Hitung Zakat</a></li>
            </ul>

            <!-- Mobile Dropdown --->
            <div class="md:hidden">
                <details class="cursor-pointer">
                    <summary class="text-3xl font-bold font-relation p-2 hover:text-blue"> Choose Menu</summary>
                    <ul class="flex flex-col gap-3 border text-black p-4 rounded-sm mt-2">
                        <li><a href="index.html" class="hover:text-yellow">Home</a></li>
                        <hr>
                        <li><a href="doa.html" class="hover:text-yellow">Doa-Doa</a></li>
                        <hr>
                        <li><a href="dzikir.html" class="hover:text-yellow">Dzikir Counter</a></li>
                        <hr>
                        <li><a href="hitung-zakat.html" class="hover:text-yellow">Hitung Zakat</a></li>
                    </ul>
                </details>
            </div>
        </nav>
        <hr class="border border-solid border-black">
    </header>
    <main class="max-w-4xl mx-auto px-10 py-10 space-y-20 font-description text-center">

        <div class="p-10 border-2 space-y-40 rounded-3xl text-center items-center align-middle">
            <section class="space-y-2 w-fit">

                <div class="flex justify-center items-center gap-5 text-2xl md:text-3xl">
                    <span class="font-relation">Target:</span>

                    <input id="targetInput" min="1" type="number" placeholder="33"
                        class="text-center rounded px-3 py-1 w-full font-relation
                            transition-all duration-300
                            active:border-none">
                </div>

                <h1 id="counterDisplay" class="text-9xl transition-all duration-300">
                    0
                </h1>

            </section>

            <section class="space-x-6">

                <button id="setTarget"
                    class="bg-blue text-white px-4 py-2 rounded transition">
                    Set Target
                </button>
                <button id="add-counter"
                    class="bg-green text-white p-4 rounded-lg text-3xl
                        transition active:scale-90 transform">
                    +
                </button>

                <button id="resetBtn"
                    class="px-4 py-2 bg-yellow rounded transition">
                    Reset
                </button>

            </section>

        </div>

    </main>
    <footer class="text-gray-500 text-center text-xs py-4">
        © 2026 Web Ramadhan
    </footer>

    <script src="src/js/counter.js"></script>
</body>
</html>
